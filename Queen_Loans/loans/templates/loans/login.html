<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queen Loans - Registro de Cliente</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 antialiased">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">👑 Queen Loans</h2>
            <p class="text-slate-500 mt-2">Crea tu cuenta de cliente para solicitar un préstamo</p>
        </div>

        <form action="" method="POST" class="space-y-5">
            {% csrf_token %}

            <div class="border-b border-slate-100 pb-4">
                <h3 class="text-sm font-semibold text-indigo-600 uppercase tracking-wider mb-3">Datos de de Usuario</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Nombre de Usuario *</label>
                        <input type="text" name="username" id="username" required 
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Contraseña *</label>
                        <input type="password" name="password" id="password" required 
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-sm font-semibold text-indigo-600 uppercase tracking-wider mb-3">Información Personal</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="nombre" class="block text-sm font-medium text-slate-700 mb-1">Nombre *</label>
                        <input type="text" name="nombre" id="nombre" required 
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                    </div>
                    <div>
                        <label for="apellido" class="block text-sm font-medium text-slate-700 mb-1">Apellido *</label>
                        <input type="text" name="apellido" id="apellido" required 
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico *</label>
                        <input type="email" name="email" id="email" required 
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                    </div>
                    <div>
                        <label for="telefono" class="block text-sm font-medium text-slate-700 mb-1">Teléfono</label>
                        <input type="tel" name="telefono" id="telefono" 
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="fecha_nacimiento" class="block text-sm font-medium text-slate-700 mb-1">Fecha de Nacimiento *</label>
                    <input type="date" name="fecha_nacimiento" id="fecha_nacimiento" required 
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                    <p class="text-xs text-slate-400 mt-1">Debes ser mayor de 18 años para registrarte.</p>
                </div>

                <div>
                    <label for="direccion" class="block text-sm font-medium text-slate-700 mb-1">Dirección Residencial</label>
                    <textarea name="direccion" id="direccion" rows="2" 
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors resize-none"></textarea>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 cursor-pointer text-center">
                    Registrar Cuenta
                </button>
            </div>
        </form>

        <div class="text-center mt-6 text-xs text-slate-400">
            &copy; 2026 Queen Loans. Todos los derechos reservados.
        </div>
    </div>

</body>
</html>

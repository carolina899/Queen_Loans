<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queen Loans - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 antialiased">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">👑 Queen Loans</h2>
            <p class="text-slate-500 mt-2">Inicia sesión en tu cuenta</p>
        </div>

        {% if form.errors %}
            <div class="mb-5 p-4 text-sm text-red-700 bg-red-50 rounded-xl border border-red-100">
                <strong>Error:</strong> Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-1">Usuario o Email</label>
                <input type="text" name="username" id="username" required 
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-indigo-500 focus:bg-white transition-all">
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Contraseña</label>
                <input type="password" name="password" id="password" required 
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-indigo-500 focus:bg-white transition-all">
            </div>
            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl shadow-sm transition-all cursor-pointer text-center">
                Entrar
            </button>
        </form>

        <div class="text-center mt-6 text-sm text-slate-500">
            ¿No tienes cuenta? <a href="/register/" class="text-indigo-600 hover:underline font-medium">Regístrate aquí</a>
        </div>
    </div>
</body>
</html>

<!-- loans/templates/loans/login.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Queen Loans - Iniciar Sesión</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 antialiased">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">👑 Queen Loans</h2>
            <p class="text-slate-500 mt-2">Inicia sesión en tu cuenta</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Usuario</label>
                <input type="text" name="username" id="username" required 
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input type="password" name="password" id="password" required 
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-all">
                Entrar
            </button>
        </form>

        <div class="text-center mt-6 text-sm text-slate-500">
            ¿No tienes cuenta? <a href="{% url 'Loans:registrar_usuario' %}" class="text-indigo-600 hover:underline">Regístrate aquí</a>
        </div>
    </div>
</body>
</html>
